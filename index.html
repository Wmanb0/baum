<body>
<div id="app">
<div id="tabbar">
<div class="tab active" data-page="graph">大词云</div>
<div class="tab" data-page="edit">添加词条</div>
<div class="tab" data-page="pool">待串联词</div>
<div class="tab" data-page="topics">专题</div>
<div class="tab" data-page="confusion">易混淆组</div>
<div class="tab" data-page="check">串联检查</div>
<div class="tab" data-page="table">词库</div>
<div class="tab" data-page="io">数据</div>
<div class="tab-spacer"></div>
<button id="theme-toggle" class="theme-toggle" title="切换主题">🌙 深色</button>
</div>
<div id="main">
<div id="page-graph" class="page active">
  <div id="graph-toolbar">
  <button id="g-toolbar-toggle" class="toolbar-toggle" title="收起筛选栏" aria-expanded="true">筛选 ◂</button>
    <input id="g-search" placeholder="搜索德语 / 中文 / 专题" style="width:170px">
    <select id="g-view">
      <option value="global">全部网络</option>
      <option value="neighbor">当前词周围</option>
      <option value="topic">按专题看</option>
      <option value="b1pending">待串联词</option>
      <option value="confusion">易混淆组</option>
      <option value="isolated">孤立词</option>
    </select>
    <select id="g-level"><option value="">全部等级</option><option>A1</option><option>A2</option><option>B1</option><option>B2</option></select>
    <select id="g-status"><option value="">全部状态</option></select>
    <select id="g-etype"><option value="">全部关系</option></select>
    <select id="g-topic"><option value="">全部专题</option></select>
    <label style="display:inline-flex;align-items:center;gap:4px;color:var(--muted);font-size:12px;white-space:nowrap;margin:0">
    <input type="checkbox" id="g-indirect" style="width:auto;min-height:0" checked>
    显示间接关系
    </label>
    <button id="g-reset">重置视图</button>
  </div>
  <div id="graph"></div>
  <div class="legend" id="graph-legend"></div>
  <div id="detail"><span class="muted">点击节点或边查看详情与操作</span></div>
</div>
<div id="page-edit" class="page"></div>
<div id="page-pool" class="page"></div>
<div id="page-topics" class="page"></div>
<div id="page-confusion" class="page"></div>
<div id="page-check" class="page"></div>
<div id="page-table" class="page"></div>
<div id="page-io" class="page"></div>
</div>
</div>
<script src="./app.js"></script>
</body>
</html>
